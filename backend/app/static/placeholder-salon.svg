<?xml version="1.0" encoding="UTF-8"?>
<!--
  Branded fallback tile shown when a salon photo is missing or fails to load.
  WHY: a soft Miami-Knows-Beauty-styled gradient with the brand "K" mark reads
  as an intentional placeholder instead of a broken grey box. Colors match the
  detail-page hero gradient (rose-100 / amber-50 / orange-100) and the favicon's
  rose accent (#fb7185) and dark stone mark (#1c1917). 4:3 aspect to match the
  card image container; preserveAspectRatio handles other containers gracefully.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Miami Knows Beauty">
  <defs>
    <linearGradient id="mkbBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe4e6"/>
      <stop offset="50%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#mkbBg)"/>
  <!-- Brand mark: rounded dark tile with the "K" and rose dot, centered -->
  <g transform="translate(168, 110)">
    <rect width="64" height="64" rx="14" fill="#1c1917" opacity="0.92"/>
    <circle cx="48" cy="16" r="7" fill="#fb7185"/>
    <path fill="#fff7ed" d="M17 46V18h6v11l10-11h8L29 31l13 15h-8L23 33v13z"/>
  </g>
  <text x="200" y="212" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="18" letter-spacing="1.5" fill="#a8a29e">Miami Knows Beauty</text>
</svg>
