<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miami Knows Beauty — Owner Journey Guide</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/assets/css/reference.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafaf9;
    }
    .card {
      max-width: 520px;
      width: 100%;
      margin: 40px auto;
      background: white;
      border: 1px solid #e7e5e4;
      border-radius: 12px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .brand {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 22px;
      font-weight: 500;
      color: #1c1917;
      margin-bottom: 32px;
      display: block;
    }
    .brand em { font-style: italic; font-weight: 400; }
    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 26px;
      font-weight: 500;
      line-height: 1.25;
      color: #1c1917;
      margin-bottom: 16px;
    }
    h1 em { font-style: italic; color: #be123c; }
    p {
      font-size: 15px;
      color: #78716c;
      line-height: 1.65;
      margin-bottom: 32px;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #be123c;
      color: white;
      font-size: 14px;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 100px;
      text-decoration: none;
      margin-bottom: 16px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #9f1239; }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      color: #be123c;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border: 1.5px solid #fecdd3;
      border-radius: 100px;
      text-decoration: none;
      margin-left: 8px;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-secondary:hover { border-color: #be123c; color: #9f1239; }
    .divider {
      border: none;
      border-top: 1px solid #e7e5e4;
      margin: 32px 0 24px;
    }
    .links {
      font-size: 13px;
      color: #a8a29e;
    }
    .links a {
      color: #be123c;
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
    .links span { margin: 0 8px; }
  </style>
</head>
<body>
  <div class="card">
    <a class="brand" href="/">Miami <em>Knows</em> Beauty</a>

    <h1>The <em>Owner Journey</em> Guide</h1>
    <p>
      Everything you need to know about claiming your listing, upgrading to Featured,
      and using the AI marketing tools — in one shareable PDF.
    </p>

    <div>
      <a class="btn-primary" href="/assets/walkthrough/mkb-owner-journey.pdf" target="_blank">
        ↓ Download PDF
      </a>
      <a class="btn-secondary" href="/owners">
        Claim your listing →
      </a>
    </div>

    <hr class="divider">

    <div class="links">
      <a href="/">The directory</a>
      <span>·</span>
      <a href="/pricing">Pricing</a>
      <span>·</span>
      <a href="/owners/login">Owner sign-in</a>
    </div>
  </div>
</body>
</html>
