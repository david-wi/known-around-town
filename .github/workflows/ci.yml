name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run smoke tests
        # WHY: Tests use mongomock-motor (in-memory MongoDB mock) so no
        # database service is needed. The PYTHONPATH points to backend/
        # so app imports resolve correctly from the tests/ subdirectory.
        working-directory: backend
        env:
          PYTHONPATH: .
        run: python -m pytest tests/test_smoke.py -x -q --tb=short
