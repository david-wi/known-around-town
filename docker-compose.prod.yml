# Production compose — runs alongside the existing Traefik reverse proxy on
# the shared droplet. The container joins the `traefik` Docker network and
# Traefik picks up the routing rules from the labels below.
#
# Hostnames are listed explicitly so each one gets a Let's Encrypt cert via
# the standard HTTP-01 challenge. To switch to wildcard subdomains
# (`*.knowsbeauty.ai.devintensive.com`) we'd swap the rules for HostRegexp
# and a DNS-01 cert resolver. For now we list every (city, network) host we
# actually want to serve.

services:
  backend:
    image: ghcr.io/david-wi/known-around-town:latest
    restart: unless-stopped
    mem_limit: 256m  # WHY: matches other small services on the shared droplet; prevents unbounded growth
    environment:
      MONGODB_URL: ${MONGODB_URL}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-known_around_town}
      NETWORK_DOMAINS: >-
        beauty:knowsbeauty.ai.devintensive.com,
        wellness:knowswellness.ai.devintensive.com,
        health:knowshealth.ai.devintensive.com,
        beauty:knowsbeauty.com,
        wellness:knowswellness.com,
        health:knowshealth.com
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      # WHY: Marketing AI surfaces stay off in production until the
      # full owner dashboard ships. Setting this here (even empty)
      # documents the wiring; stage's override is in the backend-stage
      # service block below.
      MARKETING_AI_ENABLED: ${MARKETING_AI_ENABLED_PROD:-}
      AI_GATEWAY_KEY: ${KAT_AI_GATEWAY_KEY:-}
      # WHY: owner sign-in codes need the same Resend credentials already
      # used by Identity; without these, production logs the code instead
      # of emailing it to the owner.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      # WHY: signed session cookie for owner login. Without a stable
      # value here, every container restart logs every signed-in
      # owner out (the auth module falls back to a process-lifetime
      # random key, which dies with each redeploy).
      OWNER_SESSION_SECRET: ${OWNER_SESSION_SECRET:-}
      # WHY: defaults match the current single-brand email template until
      # the owner email copy is made network-aware.
      OWNER_EMAIL_FROM_NAME: ${OWNER_EMAIL_FROM_NAME:-Knows Beauty}
      OWNER_EMAIL_FROM_ADDRESS: ${OWNER_EMAIL_FROM_ADDRESS:-noreply@knowsbeauty.ai.devintensive.com}
      # WHY: claim submission triggers an admin alert email; this controls
      # which inbox receives it.  Default routes to the public support
      # address David already monitors, so the feature works without any
      # extra config.
      ADMIN_NOTIFY_EMAIL: ${ADMIN_NOTIFY_EMAIL:-hello@knowsbeauty.com}
      # WHY: Stripe keys must be threaded through here explicitly — without
      # these lines the container never sees them even if they are set in
      # the host .env file.  Empty defaults keep the app functional (billing
      # disabled) until the keys are configured on the server.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID_PRO: ${STRIPE_PRICE_ID_PRO:-}
      # WHY: GA4 Measurement ID must be threaded through explicitly so the
      # container sees it. Empty default means no script is emitted until the
      # ID is configured — safe to deploy before GA is set up.
      GA_MEASUREMENT_ID: ${GA_MEASUREMENT_ID:-}
      # WHY: when both the custom domain and the dev subdomain serve the same
      # content, setting CANONICAL_BASE_URL=https://miami.knowsbeauty.com
      # makes every page point search engines at the clean public domain.
      # Empty default is safe — pages use the request URL until this is set.
      CANONICAL_BASE_URL: ${CANONICAL_BASE_URL:-}
      # WHY: Google Search Console verification token. Set to the value from
      # the "HTML tag" verification method in Search Console so David can
      # verify site ownership without adding a file to the repo.
      GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
      # WHY: gates the entire site behind an email+code login during the
      # pre-launch period. Defaults to true (gate active). Set to false in
      # .env on the server to open the site publicly without a code deploy.
      PREVIEW_MODE_ENABLED: ${PREVIEW_MODE_ENABLED:-true}
      LOG_LEVEL: INFO
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik"
      traefik.http.services.known-around-town.loadbalancer.server.port: "8000"

      # Beauty — public .com domains get their own router so Traefik issues a
      # cert whose main domain is the public hostname (not the dev subdomain).
      # WHY split: Traefik's certResolver builds the cert around the FIRST
      # Host() in the rule as the cert's main domain. If .ai.devintensive.com
      # comes first, that cert is served for all requests to this router —
      # including .com requests — causing a cert-mismatch error in browsers.
      # Separate routers = separate certs = correct cert served per domain.
      traefik.http.routers.kat-beauty-com.entrypoints: "https"
      traefik.http.routers.kat-beauty-com.rule: >-
        Host(`miami.knowsbeauty.com`) ||
        Host(`www.miami.knowsbeauty.com`) ||
        Host(`stage-miami.knowsbeauty.com`) ||
        Host(`fort-lauderdale.knowsbeauty.com`) ||
        Host(`boca-raton.knowsbeauty.com`)
      traefik.http.routers.kat-beauty-com.tls: "true"
      traefik.http.routers.kat-beauty-com.tls.certresolver: "letsencrypt"
      traefik.http.routers.kat-beauty-com.service: "known-around-town"

      # Beauty — dev subdomains (internal QA / Expertly platform access)
      traefik.http.routers.kat-beauty-dev.entrypoints: "https"
      traefik.http.routers.kat-beauty-dev.rule: >-
        Host(`miami.knowsbeauty.ai.devintensive.com`) ||
        Host(`knowsbeauty.ai.devintensive.com`)
      traefik.http.routers.kat-beauty-dev.tls: "true"
      traefik.http.routers.kat-beauty-dev.tls.certresolver: "letsencrypt"
      traefik.http.routers.kat-beauty-dev.service: "known-around-town"

      # Wellness — public .com domains (same split rationale as beauty above)
      traefik.http.routers.kat-wellness-com.entrypoints: "https"
      traefik.http.routers.kat-wellness-com.rule: >-
        Host(`miami.knowswellness.com`) ||
        Host(`www.miami.knowswellness.com`)
      traefik.http.routers.kat-wellness-com.tls: "true"
      traefik.http.routers.kat-wellness-com.tls.certresolver: "letsencrypt"
      traefik.http.routers.kat-wellness-com.service: "known-around-town"

      # Wellness — dev subdomains
      traefik.http.routers.kat-wellness-dev.entrypoints: "https"
      traefik.http.routers.kat-wellness-dev.rule: >-
        Host(`miami.knowswellness.ai.devintensive.com`) ||
        Host(`knowswellness.ai.devintensive.com`)
      traefik.http.routers.kat-wellness-dev.tls: "true"
      traefik.http.routers.kat-wellness-dev.tls.certresolver: "letsencrypt"
      traefik.http.routers.kat-wellness-dev.service: "known-around-town"

      # Health — dev subdomains only for now; add kat-health-com when
      # knowshealth.com .com domains are configured with DNS.
      traefik.http.routers.kat-health-dev.entrypoints: "https"
      traefik.http.routers.kat-health-dev.rule: >-
        Host(`miami.knowshealth.ai.devintensive.com`) ||
        Host(`knowshealth.ai.devintensive.com`)
      traefik.http.routers.kat-health-dev.tls: "true"
      traefik.http.routers.kat-health-dev.tls.certresolver: "letsencrypt"
      traefik.http.routers.kat-health-dev.service: "known-around-town"
      # WHY: opt this container into Watchtower auto-update.  When deploy.yml
      # pushes a new :latest image to GHCR, Watchtower detects the new digest
      # within 5 minutes and restarts this container with the updated image.
      com.centurylinklabs.watchtower.enable: "true"

  # Stage / preview environment.
  #
  # Same codebase but pinned to the `:stage` image tag, so a branch can be
  # built and deployed here for review before promoting to `:latest`.
  # Routes hostnames of the form `stage-<city>.<network>.ai.devintensive.com`
  # (e.g. stage-miami.knowsbeauty.ai.devintensive.com). The tenant resolver
  # strips the `stage-` prefix and looks up the underlying city, so the
  # stage instance shows the same content as production with whatever
  # template/code changes are in the `:stage` image. Shares MongoDB with
  # production for now; a separate DB can be wired later if we want
  # content isolation too.
  #
  # WHY only the dev hostnames are listed here (not the customer-facing
  # .com domains): staging is intentionally dev-only. The .com domains
  # are reserved for production. If we ever need a public preview at
  # something like preview.knowsbeauty.com, that's a deliberate decision
  # to add, not an oversight to fix.
  backend-stage:
    # WHY: profile keeps the stage service opt-in. Normal production
    # deploys (`docker compose up -d`) ignore this service so they
    # never try to pull a `:stage` image that doesn't exist yet.
    # To start it, run `docker compose --profile stage up -d`.
    profiles: ["stage"]
    image: ghcr.io/david-wi/known-around-town:stage
    restart: unless-stopped
    mem_limit: 256m
    environment:
      MONGODB_URL: ${MONGODB_URL}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-known_around_town}
      NETWORK_DOMAINS: >-
        beauty:knowsbeauty.ai.devintensive.com,
        wellness:knowswellness.ai.devintensive.com,
        health:knowshealth.ai.devintensive.com
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      # WHY: Marketing AI (Instagram captions, ad copy, etc.) is on
      # by default in stage so reviewers can try it without flipping
      # a separate switch. Production keeps it off until the broader
      # owner dashboard ships — see MARKETING_AI_ENABLED on the prod
      # `backend` service (absent = disabled).
      MARKETING_AI_ENABLED: ${MARKETING_AI_ENABLED:-true}
      AI_GATEWAY_KEY: ${KAT_AI_GATEWAY_KEY:-}
      # WHY: stage exercises the owner sign-in flow before launch; missing
      # credentials caused codes to be logged instead of sent.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      # WHY: signed session cookie for owner login. Without a stable
      # value here, every container restart logs every signed-in
      # owner out (the auth module falls back to a process-lifetime
      # random key, which dies with each redeploy).
      OWNER_SESSION_SECRET: ${OWNER_SESSION_SECRET:-}
      # WHY: defaults match the current single-brand email template until
      # the owner email copy is made network-aware.
      OWNER_EMAIL_FROM_NAME: ${OWNER_EMAIL_FROM_NAME:-Knows Beauty}
      OWNER_EMAIL_FROM_ADDRESS: ${OWNER_EMAIL_FROM_ADDRESS:-noreply@knowsbeauty.ai.devintensive.com}
      ADMIN_NOTIFY_EMAIL: ${ADMIN_NOTIFY_EMAIL:-hello@knowsbeauty.com}
      # WHY: same rationale as the production service above — these must be
      # listed explicitly or they never reach the container.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID_PRO: ${STRIPE_PRICE_ID_PRO:-}
      GA_MEASUREMENT_ID: ${GA_MEASUREMENT_ID:-}
      CANONICAL_BASE_URL: ${CANONICAL_BASE_URL:-}
      GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
      # WHY: stage keeps the preview gate active by default (same as prod)
      # so reviewers also go through the login flow and can verify it works.
      PREVIEW_MODE_ENABLED: ${PREVIEW_MODE_ENABLED:-true}
      LOG_LEVEL: INFO
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik"
      traefik.http.services.known-around-town-stage.loadbalancer.server.port: "8000"

      # Beauty — stage hostnames. Literal Host() rules (not HostRegexp) so
      # Let's Encrypt can generate certs per-hostname via HTTP-01 challenge.
      # Add new stage cities here as needed.
      traefik.http.routers.kat-stage-beauty.entrypoints: "https"
      traefik.http.routers.kat-stage-beauty.rule: >-
        Host(`stage-miami.knowsbeauty.ai.devintensive.com`) ||
        Host(`stage.knowsbeauty.ai.devintensive.com`)
      traefik.http.routers.kat-stage-beauty.tls: "true"
      traefik.http.routers.kat-stage-beauty.tls.certresolver: "letsencrypt"
      traefik.http.routers.kat-stage-beauty.service: "known-around-town-stage"

      # Wellness — stage hostnames
      traefik.http.routers.kat-stage-wellness.entrypoints: "https"
      traefik.http.routers.kat-stage-wellness.rule: >-
        Host(`stage-miami.knowswellness.ai.devintensive.com`) ||
        Host(`stage.knowswellness.ai.devintensive.com`)
      traefik.http.routers.kat-stage-wellness.tls: "true"
      traefik.http.routers.kat-stage-wellness.tls.certresolver: "letsencrypt"
      traefik.http.routers.kat-stage-wellness.service: "known-around-town-stage"

      # Health — stage hostnames
      traefik.http.routers.kat-stage-health.entrypoints: "https"
      traefik.http.routers.kat-stage-health.rule: >-
        Host(`stage-miami.knowshealth.ai.devintensive.com`) ||
        Host(`stage.knowshealth.ai.devintensive.com`)
      traefik.http.routers.kat-stage-health.tls: "true"
      traefik.http.routers.kat-stage-health.tls.certresolver: "letsencrypt"
      traefik.http.routers.kat-stage-health.service: "known-around-town-stage"

  watchtower:
    # WHY: polls GHCR every 5 minutes and restarts any container whose image
    # has been updated.  This is how new code gets to the server automatically
    # after a deploy.yml push — no SSH key needed in GitHub Secrets, no manual
    # `docker compose pull && up -d` after each merge.  Only watches containers
    # in this stack (label filter below) so it doesn't accidentally restart
    # unrelated services on the shared droplet.
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      # WHY: Docker socket gives Watchtower permission to pull images and
      # restart containers on the host.  This is a trusted-admin container
      # (not exposed to the internet, not in the traefik network), so the
      # broad socket access is acceptable.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # WHY: 300s = 5 minutes.  Short enough that a hotfix reaches the server
      # within one cycle.  Longer intervals reduce GHCR API calls but delay
      # deployments; 5 min is a good balance for a low-traffic service.
      WATCHTOWER_POLL_INTERVAL: "300"
      # WHY: only restart containers whose image was actually updated.
      # Without this Watchtower pulls all images on every cycle even when
      # nothing changed, wasting bandwidth and causing unnecessary restarts.
      WATCHTOWER_NO_PULL: "false"
      # WHY: removes old image layers after an update to keep disk usage down.
      # The shared droplet has limited storage; accumulating image versions
      # would fill it over time.
      WATCHTOWER_CLEANUP: "true"
      # WHY: only watch containers that have been explicitly opted in with the
      # com.centurylinklabs.watchtower.enable=true label.  This prevents
      # Watchtower from touching other services on the shared droplet that
      # are managed separately.
      WATCHTOWER_LABEL_ENABLE: "true"
      # WHY: credentials for pulling from GHCR.  The image is public so no
      # token is strictly required, but providing one avoids anonymous pull
      # rate limits (100 pulls/6h per IP vs 5000 pulls/day authenticated).
      WATCHTOWER_HTTP_API_TOKEN: ""
    labels:
      # WHY: Watchtower watches itself but shouldn't restart itself — that
      # would break the polling cycle.  Explicitly opt out.
      com.centurylinklabs.watchtower.enable: "false"

networks:
  traefik:
    external: true
