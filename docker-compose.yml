services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    # WHY: no ports: mapping here — MongoDB must NOT be accessible from the
    # internet. The backend reaches it via the internal Docker network name
    # "mongo:27017". Exposing 27017 publicly led to a ransomware wipe on
    # 2026-06-11 within hours of the server coming up.
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      MONGODB_URL: mongodb://mongo:27017
      # WHY: this dev stack intentionally runs against the local Mongo
      # container above. The app refuses local databases by default (so a
      # misconfigured production deploy can never silently use one); this
      # opt-in is the supported escape hatch for local development. It is set
      # ONLY here — docker-compose.prod.yml never sets it, so production can
      # only ever use the managed Atlas database.
      ALLOW_LOCAL_MONGODB: "true"
      # Stripe billing — set real values in .env (never commit secrets here).
      # STRIPE_SECRET_KEY: sk_live_...        (or sk_test_... for dev)
      # STRIPE_WEBHOOK_SECRET: whsec_...      (from Stripe Dashboard > Webhooks)
      # STRIPE_PRICE_ID_PRO: price_...        (the annual Pro plan price id)
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  mongo_data:
