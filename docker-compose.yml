services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      MONGODB_URL: mongodb://mongo:27017
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  mongo_data:
